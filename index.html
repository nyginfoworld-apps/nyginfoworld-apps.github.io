<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>My Web Games</title>

<style>

body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
background:#0f172a;
color:white;
text-align:center;
}

/* header */

header{
padding:40px;
background:#020617;
}

header h1{
margin:0;
font-size:40px;
}

header p{
color:#94a3b8;
}

/* container */

.container{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:25px;
padding:40px;
max-width:1000px;
margin:auto;
}

/* card */

.card{
background:#1e293b;
padding:25px;
border-radius:12px;
transition:.2s;
box-shadow:0 5px 20px rgba(0,0,0,.3);
}

.card:hover{
transform:translateY(-5px);
background:#334155;
}

.card h3{
margin-top:0;
}

.card a{
display:inline-block;
margin-top:10px;
padding:10px 18px;
border-radius:6px;
background:#f43f5e;
color:white;
text-decoration:none;
font-weight:bold;
}

/* footer */

footer{
margin-top:40px;
padding:20px;
color:#64748b;
}

</style>

</head>

<body>

<header>

<h1>🎮 My Web Games</h1>
<p>Browser games built with HTML, CSS & JavaScript</p>

</header>

<div class="container" id="repoContainer">

<div class="card">
<h3>🎈 Balloon Pop Game</h3>
<p>Pop balloons and avoid bombs!</p>
<a href="https://nyginfoworld-apps.github.io/balloon-pop-game">
Play Game
</a>
</div>

</div>

<footer>

Built with ❤️ using GitHub Pages

</footer>

</body>

</html>
